userProfile:
  type: text
  label: "Your name?"
  help: "Provide your name, please."

userRole:
  type: select
  label: "Your role?"
  help: "Select the option that best describes your current role."
  options:
    - Developer
    - Data Scientist
    - System Administrator
    - Designer
    - Student
    - Other

userAIchoice:
  type: select
  label: "Which ai model are you interested in using?"
  options:
    - Ollama (Free)
    - BuddyLLM (Free)

userPrimaryLanguage:
  type: select
  label: "What language do you want to chat with AI?"
  options:
    - English
    - Spanish
    - French


useraltChoice:
  type: text
  label: "Anything else you want our AI to remember about you?"
  help: "You can leave your response here:"

localArea:
  type: text
  label: "What is your area?"
  help: "This will help your local ai model to know exact time and location to provide you personalized response. Format must look (America/Chicago)"